<section class="ranking-page">
  <h1>Ranking scorerów</h1>

  @if (!players().length) {
    <p class="empty">Ładowanie danych...</p>
  }

  @if (players().length) {
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>TS%</th>
            <th>EFG%</th>
            <th>FGA</th>
            <th>ShooterScore</th>
          </tr>
        </thead>
        <tbody>
          @for (p of players(); track p.rank) {
            <tr>
              <td>{{ p.rank }}</td>
              <td>{{ p.name }}</td>
              <td>{{ p.ts }}%</td>
              <td>{{ p.efg }}%</td>
              <td>{{ p.fga }}</td>
              <td>{{ p.shooterScore }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</section>
