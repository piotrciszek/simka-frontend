<article class="standings-table-card">
  <h2>{{ title() }}</h2>

  <table class="standings-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Team</th>
        <th>W</th>
        <th>L</th>
        <th>WIN%</th>
        <th>L10</th>
        <th>HOME</th>
        <th>GB</th>
      </tr>
    </thead>

    <tbody>
      @for (row of rows(); track row.team_code; let index = $index) {
        @if (index === 8) {
          <tr class="standings-table__separator">
            <td colspan="8"></td>
          </tr>
        }

        <tr>
          <td>{{ index + 1 }}</td>
<td class="standings-table__team">{{ row.team_name }}</td>
<td>{{ row.wins }}</td>
<td>{{ row.losses }}</td>
<td>{{ row.win_pct }}</td>
<td>{{ row.last10 }}</td>
<td>{{ row.home_record }}</td>
<td>{{ row.games_back }}</td>
        </tr>
      }
    </tbody>
  </table>
</article>
