<section class="advanced-stats-page">
  <h1>Zaawansowane statystyki</h1>

  @if (!rows().length) {
    <p class="empty-state">Ładowanie danych...</p>
  }

  @if (rows().length > 0) {
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            @for (header of headers(); track header) {
              <th>{{header}}</th>
            }
          </tr>
        </thead>
        <tbody>
          @for (row of rows(); track row.Name || $index) {
            <tr>
              @for (header of headers(); track header) {
                <td>{{ getCellValue(row, header) }}</td>
              }
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</section>
