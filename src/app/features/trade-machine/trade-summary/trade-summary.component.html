<section class="summary-page">
  <div class="summary-header">
    <h1>Trade Summary</h1>

    <button mat-button routerLink="/trade-machine">
      Back
    </button>
  </div>

  <div class="summary-grid">
    <article
      class="team-summary-card"
      *ngFor="let team of teams()"
    >
      <header>
        <h2>{{ team.team }}</h2>
      </header>

      <div class="table-head">
        <span>Player</span>
        <span>Salary</span>
      </div>

      <div
        class="player-row"
        *ngFor="let player of team.players"
      >
        <div>
          <strong>{{ player.Name }}</strong>
          <small>{{ player.Position }}</small>
        </div>

        <strong>{{ money(player.Salary) }}</strong>
      </div>

      <footer>
        <strong>
          Acquiring {{ team.players.length }}
          {{ team.players.length === 1 ? 'Player' : 'Players' }}
        </strong>

        <strong>{{ money(team.salary) }}</strong>
      </footer>
    </article>
  </div>
</section>
